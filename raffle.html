<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raffle Draw</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(160deg, #4f46e5 0%, #7c3aed 50%, #a21caf 100%);
            min-height: 100vh;
            padding: 2rem 1rem 4rem;
            color: #1e293b;
        }

        .container { max-width: 600px; margin: 0 auto; }

        .header { text-align: center; margin-bottom: 1.75rem; }
        .header h1 {
            color: #fff;
            font-size: 2.25rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            text-shadow: 0 2px 8px rgba(0,0,0,0.25);
        }
        .header p { color: rgba(255,255,255,0.7); margin-top: 0.375rem; font-size: 0.9rem; }

        .card {
            background: #fff;
            border-radius: 16px;
            padding: 1.25rem 1.5rem;
            margin-bottom: 0.875rem;
            box-shadow: 0 4px 24px rgba(0,0,0,0.12);
        }

        .section-label {
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.09em;
            color: rgba(255,255,255,0.65);
            margin-bottom: 0.5rem;
            margin-top: 1.25rem;
        }
        .section-label:first-child { margin-top: 0; }

        .field { display: flex; flex-direction: column; gap: 0.35rem; }
        .field label {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: #64748b;
        }
        .field input[type="text"],
        .field input[type="number"] {
            padding: 0.6rem 0.75rem;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            color: #1e293b;
            outline: none;
            transition: border-color 0.15s;
            width: 100%;
            -moz-appearance: textfield;
        }
        .field input::-webkit-outer-spin-button,
        .field input::-webkit-inner-spin-button { -webkit-appearance: none; }
        .field input:focus { border-color: #6366f1; }
        .field input:disabled { background: #f8fafc; color: #94a3b8; cursor: not-allowed; }

        /* Prize count */
        #prize-count { font-size: 1.75rem; font-weight: 700; text-align: center; }

        /* Book cards */
        .book-card {
            background: #fff;
            border-radius: 14px;
            padding: 1rem 1.25rem;
            margin-bottom: 0.75rem;
            box-shadow: 0 2px 12px rgba(0,0,0,0.09);
        }
        .book-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.875rem;
        }
        .book-label {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6366f1;
        }
        .remove-btn {
            background: none;
            border: none;
            color: #cbd5e1;
            cursor: pointer;
            font-size: 1rem;
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            line-height: 1;
            transition: color 0.15s, background 0.15s;
        }
        .remove-btn:hover { color: #ef4444; background: #fef2f2; }

        .book-fields {
            display: grid;
            grid-template-columns: 1fr 82px 1fr;
            gap: 0.75rem;
        }

        .whole-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.875rem;
            padding-top: 0.75rem;
            border-top: 1px solid #f1f5f9;
        }
        .whole-row input[type="checkbox"] {
            width: 16px; height: 16px;
            cursor: pointer;
            accent-color: #6366f1;
            flex-shrink: 0;
        }
        .whole-row label {
            font-size: 0.85rem;
            color: #64748b;
            cursor: pointer;
            user-select: none;
        }

        /* Buttons */
        .btn {
            display: block;
            width: 100%;
            padding: 0.875rem 1rem;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.15s;
            margin-bottom: 0.75rem;
            text-align: center;
        }
        .btn:active { transform: scale(0.98); }

        .btn-add {
            background: rgba(255,255,255,0.12);
            color: #fff;
            border: 2px dashed rgba(255,255,255,0.38);
        }
        .btn-add:hover { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.6); }

        .btn-draw {
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            color: #fff;
            font-size: 1.2rem;
            padding: 1.1rem 1rem;
            box-shadow: 0 4px 20px rgba(245,158,11,0.45);
            margin-top: 0.5rem;
        }
        .btn-draw:hover { box-shadow: 0 6px 28px rgba(245,158,11,0.55); }

        .btn-new {
            background: rgba(255,255,255,0.13);
            color: #fff;
            border: 2px solid rgba(255,255,255,0.35);
        }
        .btn-new:hover { background: rgba(255,255,255,0.22); }

        .btn-reset {
            background: none;
            color: rgba(255,255,255,0.55);
            border: none;
            font-size: 0.85rem;
            padding: 0.5rem;
            margin-bottom: 0;
        }
        .btn-reset:hover { color: #fff; }

        /* Error */
        .error {
            background: #fef2f2;
            border: 1.5px solid #fca5a5;
            color: #dc2626;
            padding: 0.75rem 1rem;
            border-radius: 10px;
            font-size: 0.875rem;
            margin-bottom: 0.75rem;
            display: none;
        }

        /* Results */
        #results-view { display: none; }

        .results-summary {
            text-align: center;
            padding: 1.5rem 1rem 1rem;
        }
        .results-summary h2 { font-size: 1.5rem; font-weight: 800; color: #1e293b; }
        .results-summary p { color: #94a3b8; font-size: 0.85rem; margin-top: 0.25rem; }

        .winner-row {
            display: flex;
            align-items: center;
            padding: 0.875rem 1.5rem;
            border-top: 1px solid #f1f5f9;
            gap: 1rem;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        .winner-row.visible { opacity: 1; transform: translateY(0); }

        .prize-badge {
            font-size: 0.72rem;
            font-weight: 700;
            padding: 0.3rem 0.65rem;
            border-radius: 20px;
            white-space: nowrap;
            min-width: 72px;
            text-align: center;
            flex-shrink: 0;
        }
        .p1 { background: #fef3c7; color: #92400e; }
        .p2 { background: #f1f5f9; color: #475569; }
        .p3 { background: #fff7ed; color: #c2410c; }
        .pn { background: #ede9fe; color: #6d28d9; }

        .ticket-info { font-size: 1.05rem; font-weight: 600; color: #1e293b; }
        .ticket-num { color: #6366f1; }

        .books-overview { margin-top: 0.875rem; }
        .books-overview-title {
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.09em;
            color: #94a3b8;
            padding: 1rem 1.5rem 0.5rem;
            border-top: 1px solid #f1f5f9;
        }
        .book-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.6rem 1.5rem;
            border-top: 1px solid #f8fafc;
            font-size: 0.9rem;
        }
        .book-row:last-child { padding-bottom: 1rem; }
        .book-row-name { font-weight: 600; color: #1e293b; }
        .book-row-detail { color: #94a3b8; font-size: 0.82rem; }

        @media (max-width: 420px) {
            .book-fields { grid-template-columns: 1fr 70px 1fr; gap: 0.5rem; }
            .header h1 { font-size: 1.75rem; }
        }
    </style>
</head>
<body>
<div class="container">

    <!-- SETUP VIEW -->
    <div id="setup-view">
        <div class="header">
            <h1>🎟 Raffle Draw</h1>
            <p>Norwegian ticket books · color · letter · 1–100</p>
        </div>

        <div class="section-label">Prizes</div>
        <div class="card">
            <div class="field">
                <label>Number of prizes to draw</label>
                <input type="number" id="prize-count" min="1" max="9999" value="3">
            </div>
        </div>

        <div class="section-label">Ticket Books</div>
        <div id="books-container"></div>

        <button class="btn btn-add" onclick="addBook()">＋ Add another book</button>

        <div id="error-msg" class="error"></div>
        <button class="btn btn-draw" onclick="draw()">🎲 Draw!</button>
        <button class="btn btn-reset" onclick="reset()">↺ Reset all</button>
    </div>

    <!-- RESULTS VIEW -->
    <div id="results-view">
        <div class="header">
            <h1>🏆 Results</h1>
        </div>
        <div class="card" style="padding: 0; overflow: hidden;">
            <div class="results-summary">
                <h2 id="results-heading"></h2>
                <p id="results-sub"></p>
            </div>
            <div id="winners-list"></div>
            <div class="books-overview">
                <div class="books-overview-title">Sold books</div>
                <div id="books-overview-list"></div>
            </div>
        </div>
        <button class="btn btn-new" onclick="goBack()">↩ New Draw</button>
    </div>

</div>

<p style="text-align:center; color: rgba(255,255,255,0.35); font-size: 0.8rem; margin-top: 2rem;">Made by Xqmano</p>

<script>
let bookId = 0;

function addBook() {
    bookId++;
    const n = bookId;
    const el = document.createElement('div');
    el.className = 'book-card';
    el.id = 'book-' + n;
    el.innerHTML = `
        <div class="book-card-header">
            <span class="book-label">Book ${n}</span>
            <button class="remove-btn" onclick="removeBook(${n})" title="Remove">✕</button>
        </div>
        <div class="book-fields">
            <div class="field">
                <label>Color</label>
                <input type="text" id="c-${n}" placeholder="e.g. Red">
            </div>
            <div class="field">
                <label>Letter</label>
                <input type="text" id="l-${n}" placeholder="A" maxlength="1"
                    oninput="this.value=this.value.toUpperCase().replace(/[^A-ZÆØÅ]/g,'')">
            </div>
            <div class="field">
                <label>Highest # sold</label>
                <input type="number" id="n-${n}" placeholder="1–100" min="1" max="100">
            </div>
        </div>
        <div class="whole-row">
            <input type="checkbox" id="w-${n}" onchange="toggleWhole(${n})">
            <label for="w-${n}">Whole book sold (1–100)</label>
        </div>
    `;
    document.getElementById('books-container').appendChild(el);
}

function removeBook(n) {
    if (document.querySelectorAll('.book-card').length <= 1) return;
    const el = document.getElementById('book-' + n);
    if (el) el.remove();
}

function toggleWhole(n) {
    const cb  = document.getElementById('w-' + n);
    const num = document.getElementById('n-' + n);
    if (cb.checked) { num.value = 100; num.disabled = true; }
    else            { num.value = '';  num.disabled = false; }
}

function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
}

function draw() {
    document.getElementById('error-msg').style.display = 'none';

    const prizes = parseInt(document.getElementById('prize-count').value);
    if (!prizes || prizes < 1) {
        showError('Please enter a valid number of prizes (at least 1).');
        return;
    }

    const books = document.querySelectorAll('.book-card');
    if (!books.length) { showError('Please add at least one ticket book.'); return; }

    const pool = [];
    const booksSummary = [];
    for (const book of books) {
        const id    = book.id.replace('book-', '');
        const color = document.getElementById('c-' + id).value.trim();
        const letter= document.getElementById('l-' + id).value.trim();
        const max   = parseInt(document.getElementById('n-' + id).value);

        if (!color)               { showError(`Book ${id}: please enter a color.`); return; }
        if (!letter)              { showError(`Book ${id}: please enter a letter.`); return; }
        if (!max || max < 1 || max > 100) {
            showError(`Book ${id}: highest sold number must be between 1 and 100.`);
            return;
        }
        booksSummary.push({ color, letter, max });
        for (let i = 1; i <= max; i++) pool.push({ color, letter, n: i });
    }

    if (prizes > pool.length) {
        showError(`Only ${pool.length} ticket${pool.length !== 1 ? 's' : ''} sold — can't draw ${prizes} prizes.`);
        return;
    }

    // Fisher-Yates shuffle
    for (let i = pool.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [pool[i], pool[j]] = [pool[j], pool[i]];
    }

    showResults(pool.slice(0, prizes), pool.length, booksSummary);
}

function ordinal(n) {
    const s = ['th','st','nd','rd'];
    const v = n % 100;
    return n + (s[(v - 20) % 10] || s[v] || s[0]);
}

function badgeClass(i) {
    return ['', 'p1', 'p2', 'p3'][i] || 'pn';
}

function showResults(winners, total, books) {
    document.getElementById('setup-view').style.display = 'none';
    document.getElementById('results-view').style.display = 'block';

    document.getElementById('results-heading').textContent =
        winners.length === 1 ? '1 Winner' : `${winners.length} Winners`;
    document.getElementById('results-sub').textContent =
        `Drawn from ${total} sold ticket${total !== 1 ? 's' : ''}`;

    const list = document.getElementById('winners-list');
    list.innerHTML = '';
    winners.forEach((w, idx) => {
        const row  = document.createElement('div');
        row.className = 'winner-row';
        const place = idx + 1;
        row.innerHTML = `
            <span class="prize-badge ${badgeClass(place)}">${ordinal(place)} prize</span>
            <span class="ticket-info">${w.color} ${w.letter}–<span class="ticket-num">${w.n}</span></span>
        `;
        list.appendChild(row);
        setTimeout(() => row.classList.add('visible'), 80 + idx * 65);
    });

    const overview = document.getElementById('books-overview-list');
    overview.innerHTML = '';
    books.forEach(b => {
        const row = document.createElement('div');
        row.className = 'book-row';
        const range = b.max === 100 ? '1–100 (full book)' : `1–${b.max}`;
        row.innerHTML = `
            <span class="book-row-name">${b.color} ${b.letter}</span>
            <span class="book-row-detail">${range} · ${b.max} ticket${b.max !== 1 ? 's' : ''}</span>
        `;
        overview.appendChild(row);
    });
}

function goBack() {
    document.getElementById('results-view').style.display = 'none';
    document.getElementById('setup-view').style.display = 'block';
}

function reset() {
    document.getElementById('prize-count').value = 3;
    document.getElementById('books-container').innerHTML = '';
    document.getElementById('error-msg').style.display = 'none';
    bookId = 0;
    addBook(); addBook(); addBook();
}

// Start with 3 books
addBook(); addBook(); addBook();
</script>
</body>
</html>
